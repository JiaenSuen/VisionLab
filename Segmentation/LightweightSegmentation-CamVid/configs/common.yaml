seed: 42

dataset:
  name: camvid
  root: data/CamVid
  num_classes: 11
  image_size: [512, 512]
  ignore_index: 255
  num_workers: 4

training:
  epochs: 50
  batch_size: 8
  learning_rate: 0.0003
  weight_decay: 0.0001
  mixed_precision: true

loss:
  name: combined
  ce_weight: 1.0
  dice_weight: 1.0

